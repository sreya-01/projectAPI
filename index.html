<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apple News Stream</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    /* Styles for our article cards */
    .news-card { border: 1px solid #ddd; padding: 15px; border-radius: 6px; background: #fff; margin-bottom: 20px; }
    .news-title { margin-top: 0; color: #1a1a1a; }
    .news-meta { font-size: 0.85rem; color: #666; font-style: italic; }
    .news-desc { color: #333; line-height: 1.4; }
    
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Latest Apple News</h1>

  <!-- main container-->
  <div id="news-feed">
    
    <!-- message for loading-->
    <p id="status-msg">Loading latest articles...</p>

    <!-- html template-->
    <div id="article-template" class="news-card" style="display: none;">
      <h2 class="news-title">Title Placeholder</h2>
      <p class="news-meta">Author & Source Placeholder</p>
      <p class="news-desc">Description Placeholder</p>
    </div>

  </div>

  <script>
    // get element by id
    const feedContainer = document.getElementById('news-feed');
    const statusMsg = document.getElementById('status-msg');
    const templateCard = document.getElementById('article-template');

    async function loadNewsStream() {
        // apikey
      const url = 'https://newsapi.org/v2/everything?q=Apple&language=en&sortBy=popularity&apiKey=daa6d6a633a44ebea18fa941a1680a3d';

      try {
        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`HTTP Error ${response.status}`);
        }

        const data = await response.json();

        if (!data.articles || data.articles.length === 0) {
          throw new Error("No articles found matching that query.");
        }

        // Remove the "Loading..." status message now that we have data
        statusMsg.remove();

        // Loop through all the articles sent back by NewsAPI
        data.articles.forEach(article => {
          
          // 1. Create an exact twin/clone of our hidden template card
          const nextCard = templateCard.cloneNode(true);
          
          // 2. Remove the template ID and unhide it so it shows up on the screen
          nextCard.removeAttribute('id');
          nextCard.style.display = 'block';

          // 3. Find the placeholder elements inside this clone and swap in the real text
          nextCard.querySelector('.news-title').textContent = article.title;
          nextCard.querySelector('.news-meta').textContent = `By ${article.author || 'Unknown'} | Source: ${article.source.name}`;
          nextCard.querySelector('.news-desc').textContent = article.description || "No description available.";

          // 4. Drop the newly filled card into our main news feed container
          feedContainer.appendChild(nextCard);
        });

      } catch (error) {
        console.error("Stream error:", error);
        // Turn the status text into a visible error message if things fail
        statusMsg.className = "error";
        statusMsg.textContent = "Failed to load feed: " + error.message;
      }
    }

    // Fire off the script execution
    loadNewsStream();
  </script>

</body>
</html>
